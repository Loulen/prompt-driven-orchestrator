<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Maestro · Visual Editor & Run Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="styles-v2.css"/>
<link rel="stylesheet" href="winners.css"/>
<link rel="stylesheet" href="styles-v3.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html,body{margin:0;padding:0;background:#0a0c10;}
</style>
</head>
<body>

<div id="root"></div>

<script src="data.js"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="dag.jsx"></script>
<script type="text/babel" src="start-node.jsx"></script>
<script type="text/babel" src="end-node.jsx"></script>
<script type="text/babel" src="runs-list.jsx"></script>
<script type="text/babel" src="inspector.jsx"></script>
<script type="text/babel" src="modal.jsx"></script>
<script type="text/babel" src="md-modal.jsx"></script>
<script type="text/babel" src="confirm-modal.jsx"></script>
<script type="text/babel" src="library-dropdown.jsx"></script>
<script type="text/babel" src="switch-node.jsx"></script>
<script type="text/babel" src="loop-node.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens-v2.jsx"></script>
<script type="text/babel" src="screens-v3.jsx"></script>
<script type="text/babel" src="spotlights.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#f59e0b",
  "background": "#0f1115",
  "panelTone": "cool"
}/*EDITMODE-END*/;

function MaestroApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // apply tweaks via root css vars
  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty('--acc', t.accent);
    r.style.setProperty('--acc-dim', t.accent);
    r.style.setProperty('--st-running', '#3b82f6');
    if (t.background === '#000000') {
      r.style.setProperty('--bg-1', '#000000'); r.style.setProperty('--bg-0', '#000000');
      r.style.setProperty('--bg-2', '#0a0a0c'); r.style.setProperty('--bg-3', '#141418');
    } else if (t.background === '#13110f') {
      r.style.setProperty('--bg-1', '#13110f'); r.style.setProperty('--bg-2', '#181612');
      r.style.setProperty('--bg-3', '#1f1c17');
    } else {
      r.style.setProperty('--bg-1', '#0f1115'); r.style.setProperty('--bg-2', '#14171d');
      r.style.setProperty('--bg-3', '#1a1e25');
    }
  }, [t.accent, t.background]);

  return (
    <>
      <DesignCanvas minScale={0.05} maxScale={2}>
        <DCSection id="v3A" title="Happy path A — Run lifecycle intervention" subtitle="Per-node Play/Retry/Stop · stopped · stale · paused run states">
          <DCArtboard id="v3-a1" label="01 · Run · running node · lifecycle controls" width={ART_W} height={ART_H}>
            <ScreenV3_A1/>
          </DCArtboard>
          <DCArtboard id="v3-a2" label="02 · Run · paused · Resume highlighted" width={ART_W} height={ART_H}>
            <ScreenV3_A2/>
          </DCArtboard>
          <DCArtboard id="v3-a3" label="03 · Run · stopped node · downstream cascade" width={ART_W} height={ART_H}>
            <ScreenV3_A3/>
          </DCArtboard>
          <DCArtboard id="v3-a4" label="04 · Run · stale node · agent idle banner" width={ART_W} height={ART_H}>
            <ScreenV3_A4/>
          </DCArtboard>
        </DCSection>
        <DCSection id="v3B" title="Happy path B — Launch a new run on a different repo" subtitle="Multi-section New Run modal · repo + branch · two-group pipeline picker · image upload · labeled run rows">
          <DCArtboard id="v3-b5" label="05 · New Run · repo + branch + pipeline groups" width={ART_W} height={ART_H}>
            <ScreenV3_B5/>
          </DCArtboard>
          <DCArtboard id="v3-b6" label="06 · New Run · image upload with thumbnails" width={ART_W} height={ART_H}>
            <ScreenV3_B6/>
          </DCArtboard>
          <DCArtboard id="v3-b7" label="07 · Left panel · run rows with display labels" width={ART_W} height={ART_H}>
            <ScreenV3_B7/>
          </DCArtboard>
        </DCSection>
        <DCSection id="v3C" title="Happy path C — Diffs and image outputs during a run" subtitle="Aggregate diff viewer · image gallery + lightbox · markdown with inline images">
          <DCArtboard id="v3-c8" label="08 · Pipeline info · aggregate run diff" width={ART_W} height={ART_H}>
            <ScreenV3_C8/>
          </DCArtboard>
          <DCArtboard id="v3-c9" label="09 · Node detail · image_list output gallery" width={ART_W} height={ART_H}>
            <ScreenV3_C9/>
          </DCArtboard>
          <DCArtboard id="v3-c10" label="10 · Markdown viewer · inline images" width={ART_W} height={ART_H}>
            <ScreenV3_C10/>
          </DCArtboard>
        </DCSection>
        <DCSection id="v3S" title="Component spotlight" subtitle="Output port type selector · library pipeline drift indicator">
          <DCArtboard id="v3-s11" label="11 · Spotlight · output port type selector" width={ART_W} height={ART_H}>
            <ScreenV3_S11/>
          </DCArtboard>
          <DCArtboard id="v3-s12" label="12 · Spotlight · library pipeline drift indicator" width={ART_W} height={ART_H}>
            <ScreenV3_S12/>
          </DCArtboard>
        </DCSection>
        <DCSection id="happyA" title="Happy path A — Monitor and intervene during a Run" subtitle="Inline xterm.js, fused panel, edit-during-run, frontmatter retry exhausted">
          <DCArtboard id="a1-run-default" label="01 · Run · node terminal at default height" width={ART_W} height={ART_H}>
            <ScreenA1/>
          </DCArtboard>
          <DCArtboard id="a2-info-manager" label="02 · Run · pipeline-info panel · Manager terminal" width={ART_W} height={ART_H}>
            <ScreenA2/>
          </DCArtboard>
          <DCArtboard id="a3-edit-during-run" label="03 · Run · edit during run · pending node added" width={ART_W} height={ART_H}>
            <ScreenA3/>
          </DCArtboard>
          <DCArtboard id="a4-fail-validation" label="04 · Run · failed · frontmatter retry exhausted" width={ART_W} height={ART_H}>
            <ScreenA4/>
          </DCArtboard>
        </DCSection>
        <DCSection id="happyB" title="Happy path B — Design a pipeline from the library" subtitle="Library focus, typed outputs, ForEach + Merge, lint diagnostic">
          <DCArtboard id="b5-template-design" label="05 · Library · template selected · design context" width={ART_W} height={ART_H}>
            <ScreenB5/>
          </DCArtboard>
          <DCArtboard id="b6-schema-enum" label="06 · Inspector · output schema with enum" width={ART_W} height={ART_H}>
            <ScreenB6/>
          </DCArtboard>
          <DCArtboard id="b7-foreach-merge" label="07 · Canvas · ForEach + Merge convergence" width={ART_W} height={ART_H}>
            <ScreenB7/>
          </DCArtboard>
          <DCArtboard id="b8-lint" label="08 · Canvas · fan-out without Merge · lint info" width={ART_W} height={ART_H}>
            <ScreenB8/>
          </DCArtboard>
        </DCSection>
        <DCSection id="happyC" title="Happy path C — Launch a new Run" subtitle="+ New Run modal fed by starred templates">
          <DCArtboard id="c9-new-run" label="09 · + New Run · pipeline picker" width={ART_W} height={ART_H}>
            <ScreenC9/>
          </DCArtboard>
        </DCSection>
        <DCSection id="spotlight" title="Component spotlight" subtitle="Expanded terminal · star popover · enum schema row">
          <DCArtboard id="s10-terminal-expanded" label="10 · Spotlight · expanded node terminal" width={ART_W} height={ART_H}>
            <ScreenS10/>
          </DCArtboard>
          <DCArtboard id="s11-info-popover" label="11 · Spotlight · info panel · star popover" width={ART_W} height={ART_H}>
            <ScreenS11/>
          </DCArtboard>
          <DCArtboard id="s12-schema-enum" label="12 · Spotlight · output schema · enum row" width={ART_W} height={ART_H}>
            <ScreenS12/>
          </DCArtboard>
        </DCSection>
        <DCSection id="winners" title="Component spotlights — picked winners" subtitle="H1 node cadre · P2 port pill · O3 output card · F1 field row · S1 AND-rail branches · I1 hairline inspector port row · amber inspector accent">
          <DCArtboard id="w1-nodes" label="W1 · Node card · H1 status × type matrix" width={ART_W} height={ART_H}>
            <SpotNodes/>
          </DCArtboard>
          <DCArtboard id="w2-ports" label="W2 · Port row · P2 capsule pill" width={ART_W} height={ART_H}>
            <SpotPorts/>
          </DCArtboard>
          <DCArtboard id="w3-inspector" label="W3 · Inspector · O3 output + F1 field + S1 branches" width={ART_W} height={ART_H}>
            <SpotInspector/>
          </DCArtboard>
        </DCSection>
        <DCSection id="carryover" title="Carry-overs" subtitle="Out-of-scope screens kept as-is from the previous iteration">
          <DCArtboard id="empty" label="Empty state — no run selected" width={ART_W} height={ART_H}>
            <Screen8/>
          </DCArtboard>
          <DCArtboard id="md-verdict" label="Markdown viewer · verdict" width={ART_W} height={ART_H}>
            <Screen9/>
          </DCArtboard>
          <DCArtboard id="md-feedback" label="Markdown viewer · iter 4 of 5" width={ART_W} height={ART_H}>
            <Screen9b/>
          </DCArtboard>
          <DCArtboard id="edit-switch" label="Switch · branch editor" width={ART_W} height={ART_H}>
            <Screen13/>
          </DCArtboard>
          <DCArtboard id="edit-loop" label="Loop · config" width={ART_W} height={ART_H}>
            <Screen14/>
          </DCArtboard>
          <DCArtboard id="edit-library" label="Library dropdown open" width={ART_W} height={ART_H}>
            <Screen15/>
          </DCArtboard>
          <DCArtboard id="run-loop-switch" label="Run · Loop + Switch executing" width={ART_W} height={ART_H}>
            <Screen16/>
          </DCArtboard>
          <DCArtboard id="star-states" label="Star · favorite states" width={ART_W} height={ART_H}>
            <Screen17/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme"/>
        <TweakColor label="Accent" value={t.accent}
          options={['#10b981','#a78bfa','#3b82f6','#f59e0b','#e5e5e5']}
          onChange={(v) => setTweak('accent', v)}/>
        <TweakColor label="Background" value={t.background}
          options={['#000000','#0f1115','#13110f']}
          onChange={(v) => setTweak('background', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MaestroApp/>);
</script>

</body>
</html>
