<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>PDO · Visual Editor & Run Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="styles-v2.css"/>
<link rel="stylesheet" href="winners.css"/>
<link rel="stylesheet" href="styles-v3.css"/>
<link rel="stylesheet" href="refonte.css"/>
<link rel="stylesheet" href="triggers.css"/>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  html,body{margin:0;padding:0;background:#0a0c10;}
</style>
</head>
<body>

<div id="root"></div>

<script src="data.js"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="dag.jsx"></script>
<script type="text/babel" src="start-node.jsx"></script>
<script type="text/babel" src="end-node.jsx"></script>
<script type="text/babel" src="runs-list.jsx"></script>
<script type="text/babel" src="inspector.jsx"></script>
<script type="text/babel" src="modal.jsx"></script>
<script type="text/babel" src="md-modal.jsx"></script>
<script type="text/babel" src="confirm-modal.jsx"></script>
<script type="text/babel" src="library-dropdown.jsx"></script>
<script type="text/babel" src="switch-node.jsx"></script>
<script type="text/babel" src="loop-node.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="screens-v2.jsx"></script>
<script type="text/babel" src="screens-v3.jsx"></script>
<script type="text/babel" src="spotlights.jsx"></script>
<script type="text/babel" src="refonte-canvas.jsx"></script>
<script type="text/babel" src="refonte-inspect.jsx"></script>
<script type="text/babel" src="refonte-screens.jsx"></script>
<script type="text/babel" src="triggers-screens.jsx"></script>

<script type="text/babel" data-presets="env,react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#c2a15e",
  "background": "#0f1115",
  "panelTone": "cool"
}/*EDITMODE-END*/;

function PDOApp() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // apply tweaks via root css vars
  React.useEffect(() => {
    const r = document.documentElement;
    // single muted accent drives interaction + active/running status
    const hex = t.accent;
    const m = hex.replace('#','').match(/.{2}/g) || ['c2','a1','5e'];
    const rgb = m.map(h => parseInt(h, 16));
    const dim = rgb.map(c => Math.round(c * 0.82)).join(',');
    const csv = rgb.join(',');
    r.style.setProperty('--acc', hex);
    r.style.setProperty('--acc-dim', `rgb(${dim})`);
    r.style.setProperty('--acc-bg', `rgba(${csv},0.12)`);
    r.style.setProperty('--acc-border', `rgba(${csv},0.34)`);
    r.style.setProperty('--st-running', hex);
    r.style.setProperty('--st-running-bg', `rgba(${csv},0.14)`);
    r.style.setProperty('--st-await', hex);
    r.style.setProperty('--st-await-bg', `rgba(${csv},0.14)`);
    r.style.setProperty('--st-done', hex);
    r.style.setProperty('--st-done-bg', `rgba(${csv},0.14)`);
    if (t.background === '#000000') {
      r.style.setProperty('--bg-1', '#000000'); r.style.setProperty('--bg-0', '#000000');
      r.style.setProperty('--bg-2', '#0a0a0c'); r.style.setProperty('--bg-3', '#141418');
    } else if (t.background === '#13110f') {
      r.style.setProperty('--bg-1', '#13110f'); r.style.setProperty('--bg-2', '#181612');
      r.style.setProperty('--bg-3', '#1f1c17');
    } else {
      r.style.setProperty('--bg-1', '#0f1115'); r.style.setProperty('--bg-2', '#14171d');
      r.style.setProperty('--bg-3', '#1a1e25');
    }
  }, [t.accent, t.background]);

  return (
    <>
      <DesignCanvas minScale={0.05} maxScale={2}>
        <DCSection id="loopHappy" title="Happy path A — Build &amp; run a conditional review loop" subtitle="The refonte canvas gestalt — hairline nodes (no status band, no pills) · per-document output dots · emergent inputs · flat condition labels · translucent loop region · edge detail panel. The node + UI language all the trigger screens build on.">
          <DCArtboard id="rf-1" label="01 · Canvas — review loop, idle" width={ART_W} height={ART_H}>
            <RScreen1/>
          </DCArtboard>
          <DCArtboard id="rf-2" label="02 · Edge detail — editing a condition" width={ART_W} height={ART_H}>
            <RScreen2/>
          </DCArtboard>
          <DCArtboard id="rf-3" label="03 · Canvas — collection region + single-member badge" width={ART_W} height={ART_H}>
            <RScreen3/>
          </DCArtboard>
          <DCArtboard id="rf-4" label="04 · Canvas — running · exhausted-unrouted block" width={ART_W} height={ART_H}>
            <RScreen4/>
          </DCArtboard>
        </DCSection>
        <DCSection id="trigManage" title="Happy path B — Manage &amp; monitor triggers" subtitle="The three-tab strip (Runs · Triggers · Library) · hairline trigger rows with status dots, schedules and toggles · the fire-history debugging surface · triggered-run provenance · the session-counter status bar. Same hairline node language on the center canvas.">
          <DCArtboard id="t-a1" label="05 · Triggers tab — populated" width={ART_W} height={ART_H}>
            <T_A1/>
          </DCArtboard>
          <DCArtboard id="t-a2" label="06 · Triggers tab — empty" width={ART_W} height={ART_H}>
            <T_A2/>
          </DCArtboard>
          <DCArtboard id="t-a3" label="07 · Trigger detail — fire history" width={ART_W} height={ART_H}>
            <T_A3/>
          </DCArtboard>
          <DCArtboard id="t-a4" label="08 · Runs tab — provenance + near-cap counter" width={ART_W} height={ART_H}>
            <T_A4/>
          </DCArtboard>
        </DCSection>
        <DCSection id="trigCreate" title="Happy path C — Create a trigger" subtitle="The New Run modal's mode toggle frames everything below it. Trigger mode reveals the Name · Schedule · Guard · Overlap group (a hairline-outlined distinct block), with the prompt repurposed as an input template — and the reject state when a prompt-required pipeline has neither.">
          <DCArtboard id="t-b1" label="09 · New Run modal — Trigger mode, populated" width={ART_W} height={ART_H}>
            <T_B1/>
          </DCArtboard>
          <DCArtboard id="t-b2" label="10 · New Run modal — Trigger mode, reject" width={ART_W} height={ART_H}>
            <T_B2/>
          </DCArtboard>
        </DCSection>
        <DCSection id="spotlights" title="Component spotlights" subtitle="The pieces no single screen fully reveals — the refonte node system, plus the new trigger-only components across their states.">
          <DCArtboard id="rf-5" label="11 · Node card variants" width={ART_W} height={ART_H}>
            <RScreen5/>
          </DCArtboard>
          <DCArtboard id="rf-6" label="12 · Node inspector — pooling" width={ART_W} height={ART_H}>
            <RScreen6/>
          </DCArtboard>
          <DCArtboard id="rf-7" label="13 · Region inspector / header" width={ART_W} height={ART_H}>
            <RScreen7/>
          </DCArtboard>
          <DCArtboard id="rf-8" label="14 · Edge shaping interaction" width={ART_W} height={ART_H}>
            <RScreen8/>
          </DCArtboard>
          <DCArtboard id="t-s1" label="15 · Session counter — normal · near-cap · at-cap" width={920} height={520}>
            <T_SpotSessions/>
          </DCArtboard>
          <DCArtboard id="t-s2" label="16 · Trigger row — outcomes, toggle, hover actions" width={760} height={720}>
            <T_SpotRow/>
          </DCArtboard>
          <DCArtboard id="t-s3" label="17 · Schedule chooser &amp; Guard contract" width={620} height={680}>
            <T_SpotSchedGuard/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Theme"/>
        <TweakColor label="Accent" value={t.accent}
          options={['#c2a15e','#b89160','#9aa886','#a8a08c','#a89bbf']}
          onChange={(v) => setTweak('accent', v)}/>
        <TweakColor label="Background" value={t.background}
          options={['#000000','#0f1115','#13110f']}
          onChange={(v) => setTweak('background', v)}/>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PDOApp/>);
</script>

</body>
</html>
