name: review-loop
version: "1.0"

nodes:
  - id: start
    name: Start
    type: start
    outputs:
      - name: user_prompt
        side: right

  - id: qdtXejYS
    name: loop
    type: loop
    max_iter: 3
    inputs:
      - name: in
        side: left
      - name: break
        side: left
    outputs:
      - name: body
        side: right
      - name: done
        side: right
    view: { x: 100, y: 160 }

  - id: XBG5Cxkn
    name: implementer
    type: code-mutating
    inputs:
      - name: task
        side: left
    outputs:
      - name: code
        side: right
    view: { x: 300, y: 100 }

  - id: Qws9KzRZ
    name: reviewer
    type: doc-only
    inputs:
      - name: code
        side: left
    outputs:
      - name: review
        side: right
    view: { x: 500, y: 100 }

  - id: tmkRzihO
    name: switch
    type: switch
    inputs:
      - name: in
        side: left
    outputs:
      - name: pass
        side: right
        when:
          verdict: { in: [PASS, APPROVED] }
      - name: default
        side: right
    view: { x: 700, y: 100 }

  - id: end
    name: End
    type: end
    inputs:
      - name: result
        side: left

edges:
  - source: { node: start, port: user_prompt }
    target: { node: qdtXejYS, port: in }

  - source: { node: qdtXejYS, port: body }
    target: { node: XBG5Cxkn, port: task }

  - source: { node: XBG5Cxkn, port: code }
    target: { node: Qws9KzRZ, port: code }

  - source: { node: Qws9KzRZ, port: review }
    target: { node: tmkRzihO, port: in }

  - source: { node: tmkRzihO, port: pass }
    target: { node: qdtXejYS, port: break }

  - source: { node: qdtXejYS, port: done }
    target: { node: end, port: result }
